# SOAR Robot GR00T Application Configuration

robot:
  # Robot configuration for SOAR robot
  type: "so101_follower"
  port: "/dev/ttyACM0"
  id: "so101_follower_arm"

  # Camera configuration
  cameras:
    wrist:
      type: "opencv"
      index_or_path: 0
      width: 640
      height: 480
      fps: 30
    room:
      type: "opencv"
      index_or_path: 2
      width: 640
      height: 480
      fps: 30

gr00t:
  # Task configuration
  language_instruction: "Grip the scissors and put it into the tray"
  action_horizon: 8       # Number of actions to execute from action chunk

  # Model configuration (GR00T N1.7)
  embodiment_tag: "new_embodiment"
  model_path: "/workspace/i4h/.cache/huggingface/so_arm_starter_gr00t" # configure the model path

  # TensorRT acceleration (optional — set trt_engine_path to enable)
  trt_engine_path: null  # e.g. "/path/to/trt_engines"
  trt_mode: "n17_full_pipeline"  # n17_full_pipeline | vit_llm_only | action_head | dit_only
