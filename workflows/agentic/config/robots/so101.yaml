id: so101
has_locomotion: false
has_dex_hand: false
arm_joint_count: 5
body_joint_names:
  - shoulder_pan
  - shoulder_lift
  - elbow_flex
  - wrist_flex
  - wrist_roll
hand_joint_names:
  - gripper
isaaclab_joint_pos_limit_range:
  - [-110.0, 110.0]
  - [-100.0, 100.0]
  - [-100.0, 90.0]
  - [-95.0, 95.0]
  - [-160.0, 160.0]
  - [-10.0, 100.0]
lerobot_joint_pos_limit_range:
  - [-100.0, 100.0]
  - [-100.0, 100.0]
  - [-100.0, 100.0]
  - [-100.0, 100.0]
  - [-100.0, 100.0]
  - [0.0, 100.0]
teleop_devices:
  keyboard: {}
  so101_leader:
    sim_signs_by_joint:
      shoulder_pan: 1.0
      shoulder_lift: 1.0
      elbow_flex: 1.0
      wrist_roll: 1.0
    wrist_flex_baseline_deg: 60.0
    gripper_close_offset_deg: -20.0
