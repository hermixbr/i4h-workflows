robot:
  type: so101
  home_joint_pos_rad: [0.0, -1.6, 1.4, 1.5, -1.8, 0.0]
zenoh:
  camera_names: [room, wrist]
policy:
  stack: gr00t_n15
  health_port: 8766
  model_repo: nvidia/SO_ARM_Starter_Gr00t
  model_revision: null
  task_description: Grip the scissors and put it into the tray
  embodiment_tag: new_embodiment
  action_horizon: 16
  action_head_future_tokens: 0
  execution_steps: 16
  control_hz: 60.0
  data_config: so100_dualcam
  denoising_steps: 4
  image_size: [256, 256]
  trt_engine_path: null
  infer_module: policy.scissor_pick_and_place.infer.infer
  train_module: policy.scissor_pick_and_place.train.train
  train:
    output_dir: /tmp/gr00t_so_arm
    max_steps: 1000
    save_steps: 1000
arena:
  description: SO-ARM 101 scissor pick-and-place task.
  max_timesteps: 600
dataset:
  joint_space: remap
  joint_source_unit: rad
  action_source_frame: relative_to_home
  action_output_frame: absolute
  action_names: [shoulder_pan.pos, shoulder_lift.pos, elbow_flex.pos, wrist_flex.pos, wrist_roll.pos, gripper.pos]
  state_names: [shoulder_pan.pos, shoulder_lift.pos, elbow_flex.pos, wrist_flex.pos, wrist_roll.pos, gripper.pos]
  state_split: [[single_arm, 0, 5], [gripper, 5, 6]]
  action_split: [[single_arm, 0, 5], [gripper, 5, 6]]
  skip_frames: 5
